                { id: 202, teacherId: 1, content: 'تمارين إضافية في المعادلات', date: '2024-03-14', likes: 28, comments: 8 },

            getTeacherStats(teacherId) {
                const teacher = this.teachers.find(t => t.id === teacherId);
                const teacherLessons = this.lessons.filter(l => l.teacherId === teacherId);
                const teacherPosts = this.posts.filter(p => p.teacherId === teacherId);
                return {
                    name: teacher.name, specialty: teacher.specialty, bio: teacher.bio,
                    avatar: teacher.avatar, rating: teacher.rating,
                    followers: teacher.followers.length,
                    lessons: teacherLessons.length, posts: teacherPosts.length,
                    students: teacher.students,
                    totalViews: teacherLessons.reduce((sum, l) => sum + l.views, 0),
                    totalDownloads: teacherLessons.reduce((sum, l) => sum + l.downloads, 0),
                    joinDate: teacher.joinDate, status: teacher.status
                };
            },

            addLesson(teacherId, lessonData) {
                const newLesson = { id: Date.now(), teacherId, ...lessonData, views: 0, downloads: 0 };
                this.lessons.push(newLesson);
                return newLesson;
            },

            addPost(teacherId, content) {
                const newPost = { id: Date.now(), teacherId, content, date: new Date().toISOString().split('T')[0], likes: 0, comments: 0 };
                this.posts.push(newPost);
                return newPost;
            },

            deleteLesson(lessonId) { this.lessons = this.lessons.filter(l => l.id !== lessonId); },
            deletePost(postId) { this.posts = this.posts.filter(p => p.id !== postId); },
            getTeacherLessons(teacherId) { return this.lessons.filter(l => l.teacherId === teacherId); },
            getTeacherPosts(teacherId) { return this.posts.filter(p => p.teacherId === teacherId); },

            addFollower(teacherId, studentId) {
                const teacher = this.teachers.find(t => t.id === teacherId);
                if (!teacher.followers.includes(studentId)) {
                    teacher.followers.push(studentId);
                    return true;
                }
                return false;
            },

            removeFollower(teacherId, studentId) {
                const teacher = this.teachers.find(t => t.id === teacherId);
                teacher.followers = teacher.followers.filter(id => id !== studentId);
            },

            saveToStorage() {
                localStorage.setItem('teachers', JSON.stringify(this.teachers));
                localStorage.setItem('lessons', JSON.stringify(this.lessons));
                localStorage.setItem('posts', JSON.stringify(this.posts));
            },

            loadFromStorage() {
                const savedTeachers = localStorage.getItem('teachers');
                const savedLessons = localStorage.getItem('lessons');
                const savedPosts = localStorage.getItem('posts');
                if (savedTeachers) this.teachers = JSON.parse(savedTeachers);
                if (savedLessons) this.lessons = JSON.parse(savedLessons);
                if (savedPosts) this.posts = JSON.parse(savedPosts);
            }
        };

            ],

            comments: [
                { id: 301, lessonId: 101, studentId: 1, text: 'شرح رائع جداً', date: '2024-03-15', likes: 12 },

            getStudentStats(studentId) {
                const student = this.students.find(s => s.id === studentId);
                const studentComments = this.comments.filter(c => c.studentId === studentId);
                const studentRatings = this.ratings.filter(r => r.studentId === studentId);
                return {
                    name: student.name, level: student.level, points: student.points,
                    streak: student.streak, following: student.following.length,

                    comments: studentComments.length, ratings: studentRatings.length,
                    joinDate: student.joinDate, lastActive: student.lastActive

            followTeacher(studentId, teacherId) {
                const student = this.students.find(s => s.id === studentId);
                if (!student.following.includes(teacherId)) {
                    student.following.push(teacherId);
                    student.points += 10;
                    return true;
                }
                return false;
            },

            unfollowTeacher(studentId, teacherId) {
                const student = this.students.find(s => s.id === studentId);
                student.following = student.following.filter(id => id !== teacherId);
            },

            saveLesson(studentId, lessonId) {
                const student = this.students.find(s => s.id === studentId);
                if (!student.savedLessons.includes(lessonId)) {
                    student.savedLessons.push(lessonId);
                    student.points += 5;
                    return true;
                }
                return false;
            },

                const student = this.students.find(s => s.id === studentId);
                student.savedLessons = student.savedLessons.filter(id => id !== lessonId);

                return rating ? rating.rating : 0;
            },

            getLessonAverageRating(lessonId) {
                const lessonRatings = this.ratings.filter(r => r.lessonId === lessonId);
                if (lessonRatings.length === 0) return 0;
                const sum = lessonRatings.reduce((acc, r) => acc + r.rating, 0);
                return (sum / lessonRatings.length).toFixed(1);
            },

            getLessonComments(lessonId) {
                return this.comments.filter(c => c.lessonId === lessonId).sort((a, b) => new Date(b.date) - new Date(a.date));
            },

            getFollowingTeachers(studentId) {
                const student = this.students.find(s => s.id === studentId);
                return student.following;
            },

            getSavedLessons(studentId) {
                const student = this.students.find(s => s.id === studentId);
                return student.savedLessons;
            },

            saveToStorage() {
                localStorage.setItem('students', JSON.stringify(this.students));
                localStorage.setItem('comments', JSON.stringify(this.comments));
                localStorage.setItem('ratings', JSON.stringify(this.ratings));
            },

            loadFromStorage() {
                const savedStudents = localStorage.getItem('students');
                const savedComments = localStorage.getItem('comments');
                const savedRatings = localStorage.getItem('ratings');
                if (savedStudents) this.students = JSON.parse(savedStudents);
                if (savedComments) this.comments = JSON.parse(savedComments);
                if (savedRatings) this.ratings = JSON.parse(savedRatings);
            }
        };

                        ${followingTeachers.map(t => `
                            <div class="admin-list-item">
                                <div class="admin-list-avatar">${t.avatar}</div>
                                <div>
                                    <div><strong>${t.name}</strong></div>
                                    <div style="color: #666;">${t.specialty}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <h3 style="color: #1e3c72; margin: 2rem 0 1rem;">الدروس المحفوظة (${savedLessons.length})</h3>
                    <div class="admin-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>الدرس</th>
                                    <th>الأستاذ</th>
                                    <th>النوع</th>
                                    <th>المستوى</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${savedLessons.map(l => {
                                    const teacher = TeacherSection.teachers.find(t => t.id === l.teacherId);
                                    return `
                                        <tr>
                                            <td>${l.title}</td>
                                            <td>${teacher?.name}</td>
                                            <td>${l.type === 'video' ? '🎥' : '📄'}</td>
                                            <td>${getLevelName(l.level)}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                    
                    <h3 style="color: #1e3c72; margin: 2rem 0 1rem;">آخر التعليقات (${studentComments.length})</h3>
                    <div style="display: grid; gap: 1rem;">
                        ${studentComments.map(c => {
                            const lesson = TeacherSection.lessons.find(l => l.id === c.lessonId);
                            return `
                                <div style="background: #f8f9fa; padding: 1rem; border-radius: 10px;">
                                    <p>${c.text}</p>
                                    <p style="color: #666; font-size: 0.9rem;">📌 على درس: ${lesson?.title} | 📅 ${c.date}</p>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        // ========== باقي دوال التطبيق (لوحة تحكم الأستاذ، التلميذ، إلخ) ==========
        // (هنا نضع جميع الدوال السابقة من الكود المدمج)

        // ========== دوال الإدارة (تعديل/حذف) ==========
        function editTeacher(teacherId) {
            showToast('سيتم إضافة خاصية تعديل الأستاذ قريباً', 'info');
        }

        function deleteTeacher(teacherId) {
            if (confirm('هل أنت متأكد من حذف هذا الأستاذ؟')) {
                TeacherSection.teachers = TeacherSection.teachers.filter(t => t.id !== teacherId);
                TeacherSection.saveToStorage();
                renderAdminDashboard();
                showToast('تم حذف الأستاذ بنجاح');
            }
        }

        function editStudent(studentId) {
            showToast('سيتم إضافة خاصية تعديل التلميذ قريباً', 'info');
        }

        function deleteStudent(studentId) {
            if (confirm('هل أنت متأكد من حذف هذا التلميذ؟')) {
                StudentSection.students = StudentSection.students.filter(s => s.id !== studentId);
                StudentSection.saveToStorage();
                renderAdminDashboard();
                showToast('تم حذف التلميذ بنجاح');
            }
        }

        function viewLessonDetails(lessonId) {
            const lesson = TeacherSection.lessons.find(l => l.id === lessonId);
            const teacher = TeacherSection.teachers.find(t => t.id === lesson.teacherId);
            const avgRating = StudentSection.getLessonAverageRating(lessonId);
            const comments = StudentSection.getLessonComments(lessonId);
            
            showModal(`
                <h2 style="color: #1e3c72;">${lesson.title}</h2>
                <p><strong>الأستاذ:</strong> ${teacher?.name}</p>
                <p><strong>الوصف:</strong> ${lesson.description}</p>
                <p><strong>المستوى:</strong> ${getLevelName(lesson.level)}</p>
                <p><strong>النوع:</strong> ${lesson.type === 'video' ? '🎥 فيديو' : '📄 PDF'}</p>
                ${lesson.type === 'video' ? `<p><strong>المدة:</strong> ${lesson.duration}</p>` : `<p><strong>الصفحات:</strong> ${lesson.pages}</p><p><strong>الحجم:</strong> ${lesson.size}</p>`}
                <p><strong>المشاهدات:</strong> ${lesson.views}</p>
                <p><strong>التحميلات:</strong> ${lesson.downloads}</p>
                <p><strong>التقييم:</strong> ⭐ ${avgRating}</p>
                
                <h3 style="color: #1e3c72; margin-top: 1rem;">التعليقات (${comments.length})</h3>
                ${comments.map(c => {
                    const student = StudentSection.students.find(s => s.id === c.studentId);
                    return `
                        <div style="background: #f8f9fa; padding: 0.5rem; border-radius: 5px; margin: 0.5rem 0;">
                            <strong>${student?.name}:</strong> ${c.text}
                        </div>
                    `;
                }).join('')}
            `);
        }

        function deleteLesson(lessonId) {
            if (confirm('هل أنت متأكد من حذف هذا الدرس؟')) {
                TeacherSection.lessons = TeacherSection.lessons.filter(l => l.id !== lessonId);
                TeacherSection.saveToStorage();
                renderAdminDashboard();
                showToast('تم حذف الدرس بنجاح');
            }
        }

        // ========== واجهة المصادقة مع إضافة دخول الأدمن ==========
        function showAuthModal() {
            showModal(`
                <h2 style="color: #1e3c72; text-align: center;">مرحباً بك</h2>
                <div class="user-type-selector">
                    <button class="user-type-btn" onclick="selectUserType('student')">تلميذ</button>
                    <button class="user-type-btn" onclick="selectUserType('teacher')">أستاذ</button>
                    <button class="user-type-btn" onclick="selectUserType('admin')">أدمن</button>
                </div>
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" value="${selectedUserType === 'teacher' ? 'ahmed@teacher.com' : selectedUserType === 'admin' ? 'admin@t3allam.ma' : 'youssef@student.com'}">
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="كلمة السر" value="${selectedUserType === 'admin' ? 'admin123' : '123456'}">
                </div>
                <button class="submit-btn" onclick="handleLogin()">دخول</button>
                ${selectedUserType !== 'admin' ? `
                    <p style="text-align: center; margin-top: 1rem;">
                        <a href="#" onclick="showRegisterForm()">تسجيل جديد</a>
                    </p>
                ` : ''}
            `);
        }

        function selectUserType(type) {
            selectedUserType = type;
            showAuthModal();
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (selectedUserType === 'admin') {
                if (email === ADMIN.email && password === ADMIN.password) {
                    currentUser = { id: ADMIN.id, name: ADMIN.name, type: 'admin' };
                    closeModal();
                    renderUI();
                    showToast('مرحباً بك مدير المنصة');
                } else {
                    showToast('خطأ في البريد أو كلمة السر', 'error');
                }
                return;
            }

            let user;
            if (selectedUserType === 'teacher') {
                user = TeacherSection.teachers.find(t => t.email === email && t.password === password);
            } else {
                user = StudentSection.students.find(s => s.email === email && s.password === password);
            }

            if (user) {
                currentUser = { id: user.id, name: user.name, type: selectedUserType };
                closeModal();
                renderUI();
                showToast('مرحباً بك');
            } else {
                showToast('خطأ في البريد أو كلمة السر', 'error');
            }
        }

        // ========== دوال التهيئة ==========
        TeacherSection.loadFromStorage();
        StudentSection.loadFromStorage();
        renderUI();

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) closeModal();
        };
    </script>
</body>
</html>
