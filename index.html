                if (!followingTeachers.length) return `<div class="no-data"><i class="fas fa-heart"></i><h3>لم تتابع أي أستاذ بعد</h3><p>تابع الأساتذة لمشاهدة دروسهم</p></div>`;
                return `<div class="teachers-grid">${followingTeachers.map(t => `
                    <div class="teacher-card" onclick="App.viewTeacherChannel(${t.id})">
                        <div class="teacher-header"></div>
                        <div class="teacher-avatar">${t.avatar}</div>
                        <div class="teacher-info">
                            <h3 class="teacher-name">${t.name}</h3>
                            <p class="teacher-specialty">${t.specialty}</p>
                            <button class="follow-btn following" onclick="event.stopPropagation(); App.toggleFollow(${t.id})">
                                <i class="fas fa-check"></i> متابعة
                            </button>
                        </div>
                    </div>
                `).join('')}</div>`;
            },
            
            renderAllLessons() {
                const student = this.students.find(s => s.id === this.currentUser.id);
                const lessonsToShow = this.searchResults.lessons.length ? this.searchResults.lessons : this.lessons;
                if (!lessonsToShow.length) return `<div class="no-data"><i class="fas fa-book"></i><h3>لا توجد دروس</h3><p>ابحث عن دروس في المواد التي تهمك</p></div>`;
                return `<div class="lessons-grid">${lessonsToShow.map(l => {
                    const isSaved = student.savedLessons?.includes(l.id);
                    return `
                        <div class="lesson-card" data-aos="fade-up">
                            <div class="lesson-header">📄<span class="lesson-type">PDF</span></div>
                            <div class="lesson-content">
                                <h3 class="lesson-title">${l.title}</h3>
                                <p class="lesson-teacher">${l.teacherName}</p>
                                <div class="lesson-meta">
                                    <span><i class="fas fa-layer-group"></i> ${this.getLevelName(l.level)}</span>
                                    <span><i class="fas fa-eye"></i> ${l.views}</span>
                                    <span><i class="fas fa-download"></i> ${l.downloads}</span>
                                </div>
                                <div class="lesson-actions">
                                    <button class="lesson-btn view-btn" onclick="App.viewLesson(${l.id})"><i class="fas fa-eye"></i> عرض</button>
                                    <button class="lesson-btn save-btn ${isSaved ? 'saved' : ''}" onclick="event.stopPropagation(); App.toggleSaveLesson(${l.id})">
                                        <i class="fas ${isSaved ? 'fa-check' : 'fa-bookmark'}"></i> ${isSaved ? 'محفوظ' : 'حفظ'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('')}</div>`;
            },
            
            renderSavedLessons() {
                const student = this.students.find(s => s.id === this.currentUser.id);
                const savedLessons = this.lessons.filter(l => student.savedLessons?.includes(l.id));
                if (!savedLessons.length) return `<div class="no-data"><i class="fas fa-bookmark"></i><h3>لا توجد دروس محفوظة</h3><p>احفظ الدروس التي تهمك للعودة إليها</p></div>`;
                return `<div class="lessons-grid">${savedLessons.map(l => `
                    <div class="lesson-card">
                        <div class="lesson-header">📄</div>
                        <div class="lesson-content">
                            <h3 class="lesson-title">${l.title}</h3>
                            <p class="lesson-teacher">${l.teacherName}</p>
                            <button class="lesson-btn view-btn" onclick="App.viewLesson(${l.id})">عرض</button>
                        </div>
                    </div>
                `).join('')}</div>`;
            },
            
            renderAllFiles() {
                const filesToShow = this.searchResults.files.length ? this.searchResults.files : this.files;
                if (!filesToShow.length) return `<div class="no-data"><i class="fas fa-file-pdf"></i><h3>لا توجد ملفات</h3><p>ابحث عن الملفات التي تحتاجها</p></div>`;
                
                return `<div class="files-gallery">${filesToShow.map(f => {
                    const uploader = this.teachers.find(t => t.id === f.uploadedBy) || { name: 'غير معروف' };
                    return `
                        <div class="file-card">
                            <div class="file-preview"><i class="fas fa-file-pdf"></i></div>
                            <div class="file-details">
                                <div class="file-title">${f.name}</div>
                                <div class="file-description">تم الرفع بواسطة: ${uploader.name}</div>
                                <div class="file-metadata">
                                    <span><i class="fas fa-weight-hanging"></i> ${this.formatFileSize(f.size)}</span>
                                    <span><i class="fas fa-calendar"></i> ${new Date(f.uploadDate).toLocaleDateString('ar-MA')}</span>
                                    <span><i class="fas fa-download"></i> ${f.downloads}</span>
                                </div>
                                <button class="file-download-btn" onclick="App.downloadFile('${f.id}')">
                                    <i class="fas fa-download"></i> تحميل
                                </button>
                            </div>
                        </div>
                    `;
                }).join('')}</div>`;
            },
            
            showStudentTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
                document.getElementById('studentContent').innerHTML = {
                    'teachers': this.renderAllTeachers(),
                    'following': this.renderFollowingTeachers(),
                    'lessons': this.renderAllLessons(),
                    'saved': this.renderSavedLessons(),
                    'files': this.renderAllFiles()
                }[tab];
            },
            
            searchContent() {
                const s = document.getElementById('searchInput')?.value?.toLowerCase() || '';
                const l = document.getElementById('levelFilter')?.value || '';
                const sub = document.getElementById('subjectFilter')?.value || '';
                const tn = document.getElementById('teacherFilter')?.value?.toLowerCase() || '';
                
                this.filters = { search: s, level: l, subject: sub, teacherName: tn };
                
                this.searchResults.teachers = this.teachers.filter(t => {
                    let m = true;
                    if (s) m = m && (t.name.toLowerCase().includes(s) || t.specialty.toLowerCase().includes(s));
                    if (l) m = m && t.levels?.includes(l);
                    if (sub) m = m && t.subjects?.includes(sub);
                    if (tn) m = m && t.name.toLowerCase().includes(tn);
                    return m;
                });
                
                this.searchResults.lessons = this.lessons.filter(l => {
                    let m = true;
                    if (s) m = m && (l.title.toLowerCase().includes(s) || l.description.toLowerCase().includes(s));
                    if (l) m = m && l.level === l;
                    if (sub) m = m && l.subject === sub;
                    return m;
                });
                
                this.searchResults.files = this.files.filter(f => {
                    let m = true;
                    if (s) m = m && f.name.toLowerCase().includes(s);
                    return m;
                });
                
                const countEl = document.querySelector('.results-count');
                if (countEl) {
                    countEl.innerHTML = `${this.searchResults.teachers.length} أستاذ • ${this.searchResults.lessons.length} درس • ${this.searchResults.files.length} ملف`;
                }
                
                this.showActiveFilters();
            },
            
            showActiveFilters() {
                const c = document.getElementById('activeFilters');
                if (!c) return;
                c.innerHTML = Object.entries(this.filters).filter(([_, v]) => v).map(([k, v]) => `
                    <div class="filter-tag"><i class="fas ${k === 'search' ? 'fa-search' : k === 'level' ? 'fa-layer-group' : k === 'subject' ? 'fa-book' : 'fa-user'}"></i> ${v}<button onclick="App.removeFilter('${k}')">&times;</button></div>
                `).join('');
            },
            
            removeFilter(f) {
                this.filters[f] = '';
                document.getElementById({ search: 'searchInput', level: 'levelFilter', subject: 'subjectFilter', teacherName: 'teacherFilter' }[f]).value = '';
                this.searchContent();
            },
            
            toggleFollow(teacherId) {
                const student = this.students.find(s => s.id === this.currentUser.id);
                const teacher = this.teachers.find(t => t.id === teacherId);
                
                if (!student.following) student.following = [];
                
                if (student.following.includes(teacherId)) {
                    student.following = student.following.filter(id => id !== teacherId);
                    teacher.followers = teacher.followers?.filter(id => id !== student.id) || [];
                    this.toast('تم إلغاء المتابعة', 'info');
                } else {
                    student.following.push(teacherId);
                    if (!teacher.followers) teacher.followers = [];
                    teacher.followers.push(student.id);
                    student.points += 10;
                    this.toast('تمت المتابعة +10 نقاط', 'success');
                }
                
                this.saveAll();
                const activeTab = document.querySelector('.tab-btn.active')?.textContent || '';
                activeTab.includes('أساتذتي') ? this.showStudentTab('following') : this.showStudentTab('teachers');
            },
            
            toggleSaveLesson(lessonId) {
                const student = this.students.find(s => s.id === this.currentUser.id);
                if (!student.savedLessons) student.savedLessons = [];
                
                if (student.savedLessons.includes(lessonId)) {
                    student.savedLessons = student.savedLessons.filter(id => id !== lessonId);
                    this.toast('تم إزالة الدرس', 'info');
                } else {
                    student.savedLessons.push(lessonId);
                    student.points += 5;
                    this.toast('تم حفظ الدرس +5 نقاط', 'success');
                }
                
                this.saveAll();
                const activeTab = document.querySelector('.tab-btn.active')?.textContent || '';
                activeTab.includes('محفوظاتي') ? this.showStudentTab('saved') : this.showStudentTab('lessons');
            },
            
            viewLesson(lessonId) {
                const lesson = this.lessons.find(l => l.id === lessonId);
                lesson.views += 1;
                this.saveAll();
                
                const file = lesson.fileId ? this.files.find(f => f.id === lesson.fileId) : null;
                
                this.showModal(`
                    <h2 style="color: var(--primary);">${lesson.title}</h2>
                    <p style="margin: 1rem 0;">${lesson.description}</p>
                    <div style="background: var(--light); padding: 1.5rem; border-radius: var(--radius-xl);">
                        <p><strong>الأستاذ:</strong> ${lesson.teacherName}</p>
                        <p><strong>المستوى:</strong> ${this.getLevelName(lesson.level)}</p>
                        <p><strong>المادة:</strong> ${this.getSubjectName(lesson.subject)}</p>
                        <p><strong>المشاهدات:</strong> ${lesson.views}</p>
                        <p><strong>التحميلات:</strong> ${lesson.downloads}</p>
                    </div>
                    ${file ? `
                        <div style="margin-top: 2rem;">
                            <button class="submit-btn" onclick="App.downloadFile('${file.id}')">
                                <i class="fas fa-download"></i> تحميل الملف
                            </button>
                        </div>
                    ` : ''}
                `);
            },
            
            viewTeacherChannel(teacherId) {
                this.viewingChannel = teacherId;
                const teacher = this.teachers.find(t => t.id === teacherId);
                const student = this.students.find(s => s.id === this.currentUser?.id);
                const isFollowing = student?.following?.includes(teacherId) || false;
                const teacherLessons = this.lessons.filter(l => l.teacherId === teacherId);
                const teacherPosts = this.posts.filter(p => p.teacherId === teacherId);
                const teacherFiles = this.files.filter(f => f.uploadedBy === teacherId);
                
                document.getElementById('dashboard').innerHTML = `
                    <div class="channel-page">
                        <div class="channel-cover">
                            <div class="channel-avatar-large">${teacher.avatar}</div>
                            <div class="channel-cover-content"><h1>${teacher.name}</h1><p>${teacher.specialty}</p></div>
                        </div>
                        <div class="channel-info">
                            <h1 class="channel-name">${teacher.name}</h1>
                            <p class="channel-specialty">${teacher.specialty}</p>
                            <p class="channel-bio">${teacher.bio}</p>
                            <div class="channel-meta">
                                <div class="channel-meta-item"><div class="channel-meta-value">${teacher.followers?.length || 0}</div><div class="channel-meta-label">متابع</div></div>
                                <div class="channel-meta-item"><div class="channel-meta-value">${teacherPosts.length}</div><div class="channel-meta-label">منشور</div></div>
                                <div class="channel-meta-item"><div class="channel-meta-value">${teacherLessons.length}</div><div class="channel-meta-label">درس</div></div>
                                <div class="channel-meta-item"><div class="channel-meta-value">${teacherFiles.length}</div><div class="channel-meta-label">ملف</div></div>
                            </div>
                            <div class="channel-actions">
                                ${this.currentUser?.type === 'student' ? `
                                    <button class="channel-btn channel-btn-primary" onclick="App.toggleFollow(${teacher.id})">
                                        <i class="fas ${isFollowing ? 'fa-check' : 'fa-plus'}"></i> ${isFollowing ? 'متابعة' : 'متابعة'}
                                    </button>
                                ` : this.currentUser?.id === teacher.id ? `
                                    <button class="channel-btn channel-btn-primary" onclick="App.showAddPostForm()"><i class="fas fa-plus"></i> إضافة منشور</button>
                                    <button class="channel-btn channel-btn-secondary" onclick="App.showAddLessonForm()"><i class="fas fa-book"></i> إضافة درس</button>
                                    <button class="channel-btn channel-btn-secondary" onclick="App.showUploadFileForm()"><i class="fas fa-upload"></i> رفع ملف</button>
                                ` : ''}
                                <button class="channel-btn channel-btn-secondary" onclick="App.goHome()"><i class="fas fa-arrow-right"></i> رجوع</button>
                            </div>
                        </div>
                        <div class="channel-tabs">
                            <button class="channel-tab active" onclick="App.showChannelTab('posts')"><i class="fas fa-newspaper"></i> المنشورات</button>
                            <button class="channel-tab" onclick="App.showChannelTab('lessons')"><i class="fas fa-book"></i> الدروس</button>
                            <button class="channel-tab" onclick="App.showChannelTab('files')"><i class="fas fa-file-pdf"></i> الملفات</button>
                            <button class="channel-tab" onclick="App.showChannelTab('about')"><i class="fas fa-info-circle"></i> حول</button>
                        </div>
                        <div class="channel-content" id="channelContent">${this.renderChannelPosts(teacherPosts)}</div>
                    </div>
                `;
            },
            
            renderChannelPosts(posts) {
                if (!posts.length) return `<p style="text-align: center; color: var(--gray);">لا توجد منشورات بعد</p>`;
                return `<div class="posts-grid">${posts.map(p => `
                    <div class="post-card"><h3 class="post-title">${p.title}</h3><div class="post-meta">📅 ${p.date}</div><div class="post-content">${p.description}</div></div>
                `).join('')}</div>`;
            },
            
            showChannelTab(tab) {
                const teacher = this.teachers.find(t => t.id === this.viewingChannel);
                document.querySelectorAll('.channel-tab').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
                document.getElementById('channelContent').innerHTML = {
                    'posts': this.renderChannelPosts(this.posts.filter(p => p.teacherId === teacher.id)),
                    'lessons': `<div class="lessons-grid">${this.lessons.filter(l => l.teacherId === teacher.id).map(l => `
                        <div class="lesson-card"><h3>${l.title}</h3><p>${l.description}</p></div>
                    `).join('')}</div>`,
                    'files': `<div class="files-gallery">${this.files.filter(f => f.uploadedBy === teacher.id).map(f => `
                        <div class="file-card">
                            <div class="file-preview"><i class="fas fa-file-pdf"></i></div>
                            <div class="file-details">
                                <div class="file-title">${f.name}</div>
                                <button class="file-download-btn" onclick="App.downloadFile('${f.id}')">تحميل</button>
                            </div>
                        </div>
                    `).join('')}</div>`,
                    'about': `<h3>عن الأستاذ</h3><p>${teacher.bio}</p><h3>المواد</h3><p>${teacher.subjects?.map(s => this.getSubjectName(s)).join(' - ')}</p>`
                }[tab];
            },
            
            renderTeacherDashboard() {
                const teacher = this.teachers.find(t => t.id === this.currentUser.id);
                const teacherLessons = this.lessons.filter(l => l.teacherId === teacher.id);
                const teacherPosts = this.posts.filter(p => p.teacherId === teacher.id);
                const teacherFiles = this.files.filter(f => f.uploadedBy === teacher.id);
                
                document.getElementById('dashboard').innerHTML = `
                    <div class="welcome-card"><h1>مرحباً بك أ. ${teacher.name} 👨‍🏫</h1><p>${teacher.bio}</p></div>
                    
                    <div class="stats-grid">
                        ${[
                            ['users', teacher.followers?.length || 0, 'متابع'],
                            ['newspaper', teacherPosts.length, 'منشور'],
                            ['book', teacherLessons.length, 'درس'],
                            ['file-pdf', teacherFiles.length, 'ملف'],
                            ['star', teacher.rating, 'تقييم']
                        ].map(([icon, value, label]) => `
                            <div class="stat-card"><div class="stat-icon"><i class="fas fa-${icon}"></i></div><div class="stat-content"><div class="stat-value">${value}</div><div class="stat-label">${label}</div></div></div>
                        `).join('')}
                    </div>
                    
                    <div class="file-upload-section">
                        <h2 style="color: var(--primary); margin-bottom: 2rem;"><i class="fas fa-cloud-upload-alt"></i> رفع ملفات</h2>
                        <div class="file-upload-area" id="dropArea" onclick="App.triggerFileInput()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <h3>اسحب وأفلت الملفات هنا</h3>
                            <p>أو اضغط لاختيار ملفات</p>
                            <p style="font-size: var(--font-size-sm); color: var(--gray);">يدعم PDF, صور, فيديو (حد أقصى 10MB)</p>
                            <input type="file" id="fileInput" class="file-input" multiple onchange="App.handleFileSelect(event)">
                        </div>
                        <div id="fileList" class="file-list"></div>
                    </div>
                    
                    <div style="background: rgba(255,255,255,0.95); padding: 2rem; border-radius: var(--radius-2xl); margin-top: 2rem;">
                        <h2 style="color: var(--primary);">إجراءات سريعة</h2>
                        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                            <button class="nav-btn" style="background: var(--primary); color: white;" onclick="App.viewTeacherChannel(${teacher.id})"><i class="fas fa-eye"></i> عرض قناتي</button>
                            <button class="nav-btn" style="background: var(--secondary); color: var(--primary);" onclick="App.showAddPostForm()"><i class="fas fa-plus"></i> إضافة منشور</button>
                            <button class="nav-btn" style="background: var(--secondary); color: var(--primary);" onclick="App.showAddLessonForm()"><i class="fas fa-book"></i> إضافة درس</button>
                        </div>
                    </div>
                `;
                
                setTimeout(() => {
                    this.initFileUpload();
                    this.renderFileList();
                }, 100);
            },
            
            showAddPostForm() {
                this.showModal(`
                    <h2 style="color: var(--primary);">إضافة منشور جديد</h2>
                    <div class="form-group"><label>العنوان</label><input type="text" id="postTitle"></div>
                    <div class="form-group"><label>المحتوى</label><textarea id="postDesc" rows="5"></textarea></div>
                    <button class="submit-btn" onclick="App.addNewPost()">نشر</button>
                `);
            },
            
            addNewPost() {
                const title = document.getElementById('postTitle')?.value;
                const desc = document.getElementById('postDesc')?.value;
                if (!title || !desc) { this.toast('الرجاء ملء جميع الحقول', 'error'); return; }
                
                const teacher = this.teachers.find(t => t.id === this.currentUser.id);
                this.posts.push({
                    id: Date.now(), teacherId: teacher.id, teacherName: teacher.name,
                    type: 'text', title, description: desc, date: new Date().toISOString().split('T')[0],
                    views: 0, likes: 0
                });
                this.saveAll();
                this.closeModal();
                this.viewTeacherChannel(teacher.id);
                this.toast('✅ تم نشر المنشور', 'success');
            },
            
            showAddLessonForm() {
                this.showModal(`
                    <h2 style="color: var(--primary);">إضافة درس جديد</h2>
                    <div class="form-group"><label>العنوان</label><input type="text" id="lessonTitle"></div>
                    <div class="form-group"><label>الوصف</label><textarea id="lessonDesc" rows="5"></textarea></div>
                    <div class="form-group"><label>المستوى</label><select id="lessonLevel"><option value="bac1">الأولى باكالوريا</option><option value="bac2">الثانية باكالوريا</option></select></div>
                    <div class="form-group"><label>المادة</label><select id="lessonSubject"><option value="math">الرياضيات</option><option value="physique">الفيزياء</option><option value="arabic">العربية</option></select></div>
                    <div class="form-group"><label>اختر ملف</label><select id="lessonFile">
                        <option value="">بدون ملف</option>
                        ${this.files.filter(f => f.uploadedBy === this.currentUser.id).map(f => `<option value="${f.id}">${f.name}</option>`).join('')}
                    </select></div>
                    <button class="submit-btn" onclick="App.addNewLesson()">نشر</button>
                `);
            },
            
            addNewLesson() {
                const title = document.getElementById('lessonTitle')?.value;
                const desc = document.getElementById('lessonDesc')?.value;
                const level = document.getElementById('lessonLevel')?.value;
                const subject = document.getElementById('lessonSubject')?.value;
                const fileId = document.getElementById('lessonFile')?.value;
                
                if (!title || !desc) { this.toast('الرجاء ملء جميع الحقول', 'error'); return; }
                
                const teacher = this.teachers.find(t => t.id === this.currentUser.id);
                this.lessons.push({
                    id: Date.now(), title, description: desc, level, subject,
                    teacherId: teacher.id, teacherName: teacher.name,
                    date: new Date().toISOString().split('T')[0], views: 0, downloads: 0,
                    fileId: fileId || null
                });
                this.saveAll();
                this.closeModal();
                this.viewTeacherChannel(teacher.id);
                this.toast('✅ تم نشر الدرس', 'success');
            },
            
            showUploadFileForm() {
                this.showModal(`
                    <h2 style="color: var(--primary);">رفع ملف جديد</h2>
                    <div class="file-upload-area" onclick="document.getElementById('modalFileInput').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <h3>اختر ملف للرفع</h3>
                        <input type="file" id="modalFileInput" class="file-input" onchange="App.handleModalFileSelect(event)">
                    </div>
                `);
            },
            
            handleModalFileSelect(e) {
                this.handleFiles(e.target.files);
                this.closeModal();
            },
            
            showAuthModal() {
                this.showModal(`
                    <h2 style="color: var(--primary); text-align: center;">مرحباً بك في تعلّم.ما</h2>
                    <div class="user-type-selector">
                        <button class="user-type-btn ${this.selectedUserType === 'student' ? 'active' : ''}" onclick="App.selectUserType('student')"><i class="fas fa-user-graduate"></i> تلميذ</button>
                        <button class="user-type-btn ${this.selectedUserType === 'teacher' ? 'active' : ''}" onclick="App.selectUserType('teacher')"><i class="fas fa-chalkboard-teacher"></i> أستاذ</button>
                    </div>
                    <div class="form-group"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني"></div>
                    <div class="form-group"><input type="password" id="loginPassword" placeholder="كلمة السر"></div>
                    <button class="submit-btn" onclick="App.handleLogin()">دخول</button>
                    <button class="nav-btn" style="width:100%; margin-top:1rem;" onclick="App.showRegisterForm()">تسجيل جديد</button>
                `);
            },
            
            showRegisterForm() {
                this.showModal(`
                    <h2 style="color: var(--primary); text-align: center;">تسجيل جديد</h2>
                    <div class="form-group"><input type="text" id="regName" placeholder="الاسم الكامل"></div>
                    <div class="form-group"><input type="email" id="regEmail" placeholder="البريد الإلكتروني"></div>
                    <div class="form-group"><input type="password" id="regPassword" placeholder="كلمة السر"></div>
                    ${this.selectedUserType === 'teacher' ? `
                        <div class="form-group"><input type="text" id="regSpecialty" placeholder="الاختصاص"></div>
                        <div class="form-group"><textarea id="regBio" rows="3" placeholder="نبذة عنك"></textarea></div>
                    ` : ''}
                    <button class="submit-btn" onclick="App.handleRegister()">تسجيل</button>
                `);
            },
            
            selectUserType(type) {
                this.selectedUserType = type;
                document.querySelectorAll('.user-type-btn').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
            },
            
            handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                let user;
                if (this.selectedUserType === 'teacher') {
                    user = this.teachers.find(t => t.email === email && t.password === password);
                } else {
                    user = this.students.find(s => s.email === email && s.password === password);
                }
                
                if (user) {
                    this.currentUser = { id: user.id, name: user.name, type: this.selectedUserType };
                    this.saveAll();
                    this.closeModal();
                    this.render();
                    this.toast('مرحباً بك', 'success');
                } else {
                    this.toast('خطأ في البريد أو كلمة السر', 'error');
                }
            },
            
            handleRegister() {
                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                
                if (!name || !email || !password) {
                    this.toast('الرجاء ملء جميع الحقول', 'error');
                    return;
                }
                
                if (this.selectedUserType === 'teacher') {
                    if (this.teachers.find(t => t.email === email)) {
                        this.toast('البريد موجود مسبقاً', 'error');
                        return;
                    }
                    
                    const specialty = document.getElementById('regSpecialty')?.value || 'أستاذ';
                    const bio = document.getElementById('regBio')?.value || 'أستاذ جديد';
                    
                    const newTeacher = {
                        id: Date.now(), name, email, password, specialty, bio,
                        avatar: this.getRandomAvatar(), rating: 0, followers: [], subjects: [], levels: []
                    };
                    
                    this.teachers.push(newTeacher);
                    this.currentUser = { id: newTeacher.id, name, type: 'teacher' };
                    
                } else {
                    if (this.students.find(s => s.email === email)) {
                        this.toast('البريد موجود مسبقاً', 'error');
                        return;
                    }
                    
                    const newStudent = {
                        id: Date.now(), name, email, password, level: 'bac1',
                        following: [], savedLessons: [], points: 0, streak: 0
                    };
                    
                    this.students.push(newStudent);
                    this.currentUser = { id: newStudent.id, name, type: 'student' };
                }
                
                this.saveAll();
                this.closeModal();
                this.render();
                this.toast('تم التسجيل بنجاح', 'success');
            },
            
            logout() {
                this.currentUser = null;
                this.viewingChannel = null;
                localStorage.removeItem('currentUser');
                this.render();
                this.toast('تم تسجيل الخروج', 'info');
            },
            
            goHome() {
                this.viewingChannel = null;
                this.render();
            },
            
            initAnimatedBg() {
                const bg = document.getElementById('animatedBg');
                for (let i = 0; i < 30; i++) {
                    const span = document.createElement('span');
                    span.style.left = Math.random() * 100 + '%';
                    span.style.width = Math.random() * 30 + 10 + 'px';
                    span.style.height = span.style.width;
                    span.style.animationDuration = Math.random() * 30 + 15 + 's';
                    span.style.animationDelay = Math.random() * 15 + 's';
                    bg.appendChild(span);
                }
            }
        };

        App.init();
    </script>
</body>
</html>
